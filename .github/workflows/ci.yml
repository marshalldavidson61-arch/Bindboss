name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Test all packages
        run: go test ./internal/... -v -count=1

      - name: Build library package (no test files, just verify it compiles)
        run: go build ./pkg/...

      - name: Build CLI
        run: go build -o bindboss_cli .

      - name: Integration — pack, inspect, verify, run
        run: |
          # Pack
          ./bindboss_cli pack testdata/hello hello-test --run="sh run.sh"

          # Inspect — check it has a hash line
          ./bindboss_cli inspect hello-test | grep "^hash:"

          # Verify hash
          ./bindboss_cli verify hello-test

          # Run — expect "Hello from inside bindboss!" on stdout
          OUTPUT=$(./hello-test 2>/dev/null)
          echo "Output: $OUTPUT"
          echo "$OUTPUT" | grep -q "Hello from inside bindboss!" || (echo "FAIL: unexpected output"; exit 1)

      - name: Integration — keygen + sign + verify-sig
        run: |
          mkdir -p /tmp/ci-keys
          ./bindboss_cli keygen cikey --keydir=/tmp/ci-keys
          ./bindboss_cli pack testdata/hello hello-signed \
            --run="sh run.sh" \
            --sign=/tmp/ci-keys/cikey.key
          ./bindboss_cli inspect hello-signed | grep "^signed:    yes"
          ./bindboss_cli verify hello-signed --pubkey=/tmp/ci-keys/cikey.pub

      - name: Integration — tamper detection
        run: |
          # Flip a byte in the payload and verify that VerifyHash catches it
          python3 -c "
          import sys
          data = bytearray(open('hello-test','rb').read())
          # payload starts at byte 9 of a typical stub... actually just flip near the middle
          mid = len(data) // 2
          data[mid] ^= 0xFF
          open('hello-tampered','wb').write(data)
          os.chmod('hello-tampered', 0o755)
          " 2>/dev/null || python3 -c "
          import os
          data = bytearray(open('hello-test','rb').read())
          mid = len(data) // 2
          data[mid] ^= 0xFF
          open('hello-tampered','wb').write(bytes(data))
          os.chmod('hello-tampered', 0o755)
          "
          # verify should FAIL (exit non-zero) on tampered binary
          if ./bindboss_cli verify hello-tampered 2>/dev/null; then
            echo "FAIL: verify passed on tampered binary"
            exit 1
          else
            echo "PASS: verify correctly rejected tampered binary"
          fi

      - name: Stub build tags (sanity check)
        run: go build -tags stub -o /dev/null ./stub/