name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./internal/... -v -count=1

      - name: Build bindboss
        run: go build -o bindboss .

      - name: Smoke test — pack and inspect
        run: |
          mkdir -p testdata/ci-hello
          echo '#!/bin/sh' > testdata/ci-hello/run.sh
          echo 'echo "bindboss CI smoke test OK"' >> testdata/ci-hello/run.sh
          chmod +x testdata/ci-hello/run.sh
          ./bindboss pack testdata/ci-hello ci-hello --run="sh run.sh"
          ./bindboss inspect ci-hello --list
          ./ci-hello